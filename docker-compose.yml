services:
  mysql:
    image: mysql:8.0
    container_name: taskflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: taskflow_db
      MYSQL_USER: taskflow_user
      MYSQL_PASSWORD: taskflow_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: taskflow-backend
    restart: unless-stopped
    environment:
      PORT: 5011
      DB_HOST: mysql
      DB_USER: taskflow_user
      DB_PASSWORD: taskflow_password
      DB_NAME: taskflow_db
    ports:
      - "5011:5011"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - taskflow-network

  frontend:
    build: ./frontend
    container_name: taskflow-frontend
    restart: unless-stopped
    ports:
      - "8080:80"  # Changed from 80:80 to 8080:80
    depends_on:
      - backend
    networks:
      - taskflow-network

volumes:
  mysql_data:
    driver: local

networks:
  taskflow-network:
    driver: bridge